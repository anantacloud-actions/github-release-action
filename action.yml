name: "GitHub Release Action"
description: "Create GitHub releases with auto changelog and smart defaults"

inputs:
  tag:
    description: "Git tag for the release (auto-generated if not provided)"
    required: false

  name:
    description: "Release name (auto-generated if not provided)"
    required: false

  body:
    description: "Release notes / changelog (auto-generated if not provided)"
    required: false

  generate_changelog:
    description: "Whether to auto-generate changelog"
    required: false
    default: "true"

  changelog_since:
    description: "Base tag for changelog (optional override)"
    required: false

  draft:
    description: "Create as draft"
    required: false
    default: "false"

  prerelease:
    description: "Mark as prerelease"
    required: false
    default: "false"

branding:
  color: blue
  icon: arrow-up-circle
  
runs:
  using: "node20"
  main: "dist/index.js"
