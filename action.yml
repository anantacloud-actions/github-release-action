name: "GitHub Release Action"
description: "Create GitHub releases with automated changelog support"
author: "Ananta Cloud"

inputs:
  tag:
    description: "Git tag for the release"
    required: true

  name:
    description: "Release name"
    required: true

  body:
    description: "Release notes / changelog"
    required: false

  draft:
    description: "Create as draft"
    required: false
    default: "false"

  prerelease:
    description: "Mark as prerelease"
    required: false
    default: "false"

branding:
  color: blue
  icon: arrow-up-circle
  
runs:
  using: "node20"
  main: "index.js"
