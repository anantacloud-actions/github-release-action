name: "GitHub Release Action"
description: "Create GitHub releases with semantic versioning and changelog"
author: "Ananta Cloud"

inputs:
  tag:
    description: "Git tag (optional)"
    required: false

  name:
    description: "Release name"
    required: false

  body:
    description: "Release notes"
    required: false

  version_bump:
    description: "auto | major | minor | patch"
    required: false
    default: "auto"

  artifacts:
    description: "Comma-separated file paths"
    required: false

  draft:
    default: "false"

  prerelease:
    default: "false"
    
branding:
  color: blue
  icon: arrow-up-circle
  
runs:
  using: "node20"
  main: "dist/index.js"
