name: "GitHub Release Creation"
description: "Create GitHub releases with semantic versioning and GitHub-generated notes"
author: "Ananta Cloud"

inputs:
  token:
    description: "GitHub token"
    required: true
  tag:
    description: "Git tag (optional)"
    required: false

  name:
    description: "Release name"
    required: false

  body:
    description: "Release notes"
    required: false

  version_bump:
    description: "auto | major | minor | patch"
    required: false
    default: "auto"

  generate_release_notes:
    description: "Use GitHub auto-generated release notes"
    required: false
    default: "true"

  artifacts:
    description: "Comma-separated file paths"
    required: false

  draft:
    description: "Create as draft"
    required: false
    default: "false"

  prerelease:
    description: "Mark as prerelease"
    required: false
    default: "false"

branding:
  color: blue
  icon: upload
  
runs:
  using: "node20"
  main: "dist/index.js"
